version: "3.9"

services:

  postgres:
    image: postgres:16
    container_name: leiriadetail-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: leiriadetail
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4
    container_name: leiriadetail-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@leiriadetail.pt
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5051:80"
    depends_on:
      - postgres

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.0
    container_name: leiriadetail-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - esdata:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200 || exit 1"]
      interval: 10s
      retries: 10

  kibana:
    image: docker.elastic.co/kibana/kibana:8.12.0
    container_name: leiriadetail-kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "5601:5601"
    depends_on:
      elasticsearch:
        condition: service_healthy

  liquibase:
    image: liquibase/liquibase:latest
    container_name: leiriadetail-liquibase
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./database/changelog:/liquibase/changelog
    working_dir: /liquibase/changelog
    command: 
      - --url=jdbc:postgresql://postgres:5432/leiriadetail
      - --username=postgres
      - --password=admin123
      - --changeLogFile=db.changelog.xml
      - update

  graphql:
    build: ./graphql
    container_name: leiriadetail-graphql
    ports:
      - "4001:4001"
    environment:
      DATABASE_URL: postgres://postgres:admin123@postgres:5432/leiriadetail
      ELASTIC_URL: http://elasticsearch:9200
    depends_on:
      liquibase:
        condition: service_completed_successfully
      elasticsearch:
        condition: service_healthy

  api:
    build: ./api
    container_name: leiriadetail-api
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgres://postgres:admin123@postgres:5432/leiriadetail
    depends_on:
      liquibase:
        condition: service_completed_successfully

  frontend:
    build: ./frontend
    container_name: leiriadetail-frontend
    ports:
      - "5174:5174"
    depends_on:
      api:
        condition: service_started
      graphql:
        condition: service_started

volumes:
  pgdata:
  esdata: